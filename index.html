<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EY LIVE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="loginPage">

<div class="bgBlur"></div>

<div class="logoArea">

<img
src="assets/logo.png"
class="logo"
onerror="this.src='https://placehold.co/180x180?text=EY';">

<h1>EY LIVE</h1>

<p>Sohbet • Yayın • Eğlence</p>

</div>

<div class="loginButtons">

<button
class="googleBtn"
onclick="loginGoogle()">

<img
src="assets/google.png"
onerror="this.style.display='none'">

<span>Google ile Giriş Yap</span>

</button>

<button
class="phoneBtn"
onclick="openPhoneLogin()">

<img
src="assets/phone.png"
onerror="this.style.display='none'">

<span>Telefon Numarası ile Giriş</span>

</button>

</div>

<div class="otherTitle">

Diğer giriş yöntemleri

</div>

<div class="socialLogin">

<img
src="assets/facebook.png"
onerror="this.style.display='none'">

<img
src="assets/tiktok.png"
onerror="this.style.display='none'">

<img
src="assets/snapchat.png"
onerror="this.style.display='none'">

</div>

<div class="agree">

<input
type="checkbox"
id="agree"
checked>

<label for="agree">

Hizmet Şartları ve Gizlilik Politikasını kabul ediyorum.

</label>

</div>

</div>

<script src="js/firebase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/login.js"></script>

</body>

</html>
