<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EY LIVE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="loginPage">

    <div class="bgBlur"></div>

    <div class="logoArea">

        <img src="assets/logo.png" class="logo">

        <h1>EY LIVE</h1>

        <p>Sohbet • Yayın • Eğlence</p>

    </div>

    <div class="loginButtons">

        <button class="googleBtn" onclick="loginGoogle()">

            <img src="assets/google.png">

            <span>Google ile Giriş Yap</span>

        </button>

        <button class="phoneBtn" onclick="openPhoneLogin()">

            <img src="assets/phone.png">

            <span>Telefon Numarası ile Giriş</span>

        </button>

    </div>

    <div class="otherTitle">

        Diğer giriş yöntemleri

    </div>

    <div class="socialLogin">

        <img src="assets/facebook.png">

        <img src="assets/tiktok.png">

        <img src="assets/snapchat.png">

    </div>

    <div class="agree">

        <input type="checkbox" id="agree">

        <label for="agree">

        Hizmet Şartları ve Gizlilik Politikasını kabul ediyorum.

        </label>

    </div>

</div>

<script src="js/firebase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/login.js"></script>

</body>
</html>
