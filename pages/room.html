<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Oda — EY LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/room.css">
</head>
<body style="padding-bottom:0">

<div class="roomWrap" id="roomBg">

  <div class="roomTopBar">
    <button class="topBtn ghost" onclick="Room.leave()">←</button>
    <div class="agencyStrip" id="agencyStrip"></div>
    <div class="flexCenter" style="gap:6px">
      <button class="topBtn ghost" onclick="Room.openRules()">📜</button>
      <button class="topBtn ghost" id="settingsBtn" onclick="Room.openManage()" style="display:none">⚙️</button>
      <button class="topBtn ghost" onclick="Room.leave()">✕</button>
    </div>
  </div>

  <div class="roomSub" id="roomSub"></div>

  <div class="micGrid" id="micGrid"></div>

  <div class="handRow" id="handRow"></div>

  <div class="roomLower">
    <div class="roomChat" id="roomChat"></div>

    <div class="rankStrip" id="rankStrip"></div>

    <div class="roomBar">
      <input class="input roomInput" id="chatInput" placeholder="Mesaj yaz...">
      <button class="rBtn" onclick="Room.openEmoji()">😊</button>
      <button class="rBtn" id="handBtn" onclick="Room.toggleHand()">✋</button>
      <button class="rBtn giftBtn" onclick="Room.openGifts()">🎁</button>
      <button class="rBtn" onclick="Room.openManage()">☰</button>
    </div>
  </div>

</div>

<script src="../js/db.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/room.js"></script>
</body>
</html>
